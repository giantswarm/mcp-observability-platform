{{- $rt := (default dict .Values.runtime) }}
{{- $oa := (default dict .Values.oauth) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-observability-platform.fullname" . }}-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-observability-platform.labels" . | nindent 4 }}
data:
  # --- tool dispatch ---
  # Per-tool handler deadline. Bounded so a pathological query can't hold the
  # MCP goroutine open until the downstream HTTP client times out.
  TOOL_TIMEOUT: {{ $rt.toolTimeout | default "30s" | quote }}
  # Cap on tool response body size. 0 disables the cap. See response_cap.go.
  # `toString | default` (rather than `default 131072`) so an explicit 0 isn't
  # silently overridden back to the default — Go templates treat 0 as falsy.
  TOOL_MAX_RESPONSE_BYTES: {{ $rt.maxResponseBytes | toString | default "131072" | quote }}

  # --- OAuth trust config (SSO token forwarding + CLI client schemes) ---
  # CSV of OAuth client IDs whose tokens are accepted as if minted for this
  # server's own client ID. Tokens still must be signed by the configured
  # Dex issuer. Same semantic as mcp-kubernetes / muster. Empty = accept
  # only our own tokens.
  OAUTH_TRUSTED_AUDIENCES: {{ $oa.trustedAudiences | default (list) | join "," | quote }}
  # CSV of custom URI schemes accepted during public client registration
  # (e.g. "cursor,vscode"). Loopback HTTPS is always accepted. mcp-oauth
  # validates each scheme per RFC 3986.
  OAUTH_TRUSTED_REDIRECT_SCHEMES: {{ $oa.trustedRedirectSchemes | default (list) | join "," | quote }}
  # MCP CLI clients (Claude Code, mcp-inspector, IDE plugins) register
  # loopback redirect URIs per RFC 8252. Always-on for this MCP because
  # the streamable-http transport is the canonical CLI integration path.
  OAUTH_ALLOW_LOCALHOST_REDIRECT_URIS: "true"
