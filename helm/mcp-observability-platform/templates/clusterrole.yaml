{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mcp-observability-platform.fullname" . }}
  labels:
    {{- include "mcp-observability-platform.labels" . | nindent 4 }}
rules:
  # Read-only access to GrafanaOrganization CRs only. Do not add anything else.
  - apiGroups: ["observability.giantswarm.io"]
    resources: ["grafanaorganizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["observability.giantswarm.io"]
    resources: ["grafanaorganizations/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mcp-observability-platform.fullname" . }}
  labels:
    {{- include "mcp-observability-platform.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mcp-observability-platform.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "mcp-observability-platform.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
