{{- $hr := (default dict .Values.httpRoute) }}
{{- if $hr.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "mcp-observability-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-observability-platform.labels" . | nindent 4 }}
  {{- with $hr.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $hr.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $hr.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ include "mcp-observability-platform.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 1
      {{- with $hr.matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
