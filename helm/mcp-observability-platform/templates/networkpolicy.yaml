{{- $np := (default dict .Values.networkPolicy) }}
{{- if $np.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-observability-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-observability-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mcp-observability-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if $np.egressTo }}
    - Egress
    {{- end }}
  ingress:
    - ports:
        - port: mcp
          protocol: TCP
        - port: metrics
          protocol: TCP
      {{- with $np.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if $np.egressTo }}
  egress:
    # Always allow DNS (CoreDNS in kube-system). Without this every outbound
    # hostname lookup fails and the pod can't reach Grafana/Dex/OTLP by name.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # User-configured peers (Grafana, K8s API, Dex, OTLP collector, …).
    {{- range $np.egressTo }}
    - {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}
