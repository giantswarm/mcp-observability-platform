{{- $np := (default dict .Values.networkPolicy) }}
{{- if $np.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-observability-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-observability-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mcp-observability-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- toYaml $np.policyTypes | nindent 4 }}
  {{- with $np.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $np.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
