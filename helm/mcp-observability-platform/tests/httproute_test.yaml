suite: httproute
templates:
  - templates/httproute.yaml
tests:
  - it: not rendered by default — off unless the cluster has a Gateway
    asserts:
      - hasDocuments:
          count: 0

  - it: rendered when enabled, backend points at the chart Service on service.port
    set:
      httpRoute:
        enabled: true
        hostnames:
          - mcp-observability-platform.example.com
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mcp-observability-platform
      - equal:
          path: spec.hostnames[0]
          value: mcp-observability-platform.example.com
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME-mcp-observability-platform
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /

  - it: default parentRefs target the giantswarm-default Gateway https listener
    set:
      httpRoute:
        enabled: true
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: giantswarm-default
      - equal:
          path: spec.parentRefs[0].namespace
          value: envoy-gateway-system
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https

  - it: parentRefs, matches and annotations are toYaml'd verbatim
    set:
      httpRoute:
        enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/hostname: mcp.example.com
        parentRefs:
          - name: custom-gateway
            namespace: gateways
        matches:
          - path:
              type: PathPrefix
              value: /mcp
    asserts:
      - equal:
          path: metadata.annotations["external-dns.alpha.kubernetes.io/hostname"]
          value: mcp.example.com
      - equal:
          path: spec.parentRefs[0].name
          value: custom-gateway
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /mcp
