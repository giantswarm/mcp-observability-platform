suite: configmap
templates:
  - templates/configmap.yaml
tests:
  - it: always renders with runtime defaults
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: data.TOOL_TIMEOUT
          value: "30s"
      - equal:
          path: data.TOOL_MAX_RESPONSE_BYTES
          value: "131072"
      - equal:
          path: data.OAUTH_TRUSTED_AUDIENCES
          value: ""
      - equal:
          path: data.OAUTH_TRUSTED_REDIRECT_SCHEMES
          value: ""
      - equal:
          path: data.OAUTH_ALLOW_LOCALHOST_REDIRECT_URIS
          value: "true"

  - it: joins trusted audiences + schemes as CSV
    set:
      oauth:
        trustedAudiences:
          - muster-client
          - sibling-mcp
        trustedRedirectSchemes:
          - cursor
          - vscode
    asserts:
      - equal:
          path: data.OAUTH_TRUSTED_AUDIENCES
          value: "muster-client,sibling-mcp"
      - equal:
          path: data.OAUTH_TRUSTED_REDIRECT_SCHEMES
          value: "cursor,vscode"

  - it: honours runtime overrides
    set:
      runtime:
        toolTimeout: 60s
        maxResponseBytes: 0
    asserts:
      - equal:
          path: data.TOOL_TIMEOUT
          value: "60s"
      - equal:
          path: data.TOOL_MAX_RESPONSE_BYTES
          value: "0"
