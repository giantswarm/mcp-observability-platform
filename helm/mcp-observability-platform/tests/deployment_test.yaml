suite: deployment
templates:
  - templates/deployment.yaml
  # The checksum/config annotation includes the ConfigMap template, so it
  # must be present in the isolated test template set. Asserts scope to
  # the Deployment explicitly with the per-assert `template:` field.
  - templates/configmap.yaml
tests:
  - it: envFrom references the runtime ConfigMap
    asserts:
      - template: templates/deployment.yaml
        isKind:
          of: Deployment
      - template: templates/deployment.yaml
        equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: RELEASE-NAME-mcp-observability-platform-runtime

  - it: default replicas = 1
    asserts:
      - template: templates/deployment.yaml
        equal:
          path: spec.replicas
          value: 1

  - it: liveness probe hits /healthz, readiness hits /readyz
    asserts:
      - template: templates/deployment.yaml
        equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - template: templates/deployment.yaml
        equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz

  - it: probes target the metrics port — /healthz lives on the obs server, not MCP
    asserts:
      - template: templates/deployment.yaml
        equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: metrics
      - template: templates/deployment.yaml
        equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: metrics

  - it: container exposes the metrics port and METRICS_ADDR is wired
    asserts:
      - template: templates/deployment.yaml
        contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9091
            protocol: TCP
      - template: templates/deployment.yaml
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_ADDR
            value: ":9091"

  - it: honors extra envFrom on top of runtime ConfigMap
    set:
      extraEnvFrom:
        - secretRef:
            name: my-extra-secrets
    asserts:
      - template: templates/deployment.yaml
        equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: my-extra-secrets

  - it: pod template carries checksum/config annotation
    asserts:
      - template: templates/deployment.yaml
        exists:
          path: spec.template.metadata.annotations["checksum/config"]
